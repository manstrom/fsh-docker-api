openapi: "3.0.0"

info:
  title: Cars API
  version: "1.0.0"
  description: A local Cars API for learning automated API testing

servers:
  - url: http://localhost:3000

tags:
  - name: Health
  - name: Cars

components:
  schemas:
    Car:
      type: object
      properties:
        id:
          type: integer
          example: 1
        brand:
          type: string
          example: Volvo
        model:
          type: string
          example: XC90
        year:
          type: integer
          example: 2022
        color:
          type: string
          example: Silver
        horsepower:
          type: integer
          example: 249
        for_sale:
          type: boolean
          example: true
        created_at:
          type: string
          example: "2024-01-15T12:00:00Z"

    CreateCar:
      type: object
      required:
        - brand
        - model
        - year
        - color
        - horsepower
      properties:
        brand:
          type: string
          example: Ferrari
        model:
          type: string
          example: Roma
        year:
          type: integer
          example: 2023
        color:
          type: string
          example: Red
        horsepower:
          type: integer
          example: 612
        for_sale:
          type: boolean
          example: true

    UpdateCar:
      type: object
      properties:
        brand:
          type: string
          example: Ferrari
        model:
          type: string
          example: Roma
        year:
          type: integer
          example: 2023
        color:
          type: string
          example: Blue
        horsepower:
          type: integer
          example: 612
        for_sale:
          type: boolean
          example: false

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Car with id 99 not found"

paths:
  /health:
    get:
      summary: Health check
      tags:
        - Health
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: "Cars API is running"

  /api/cars:
    get:
      summary: Get all cars
      tags:
        - Cars
      parameters:
        - name: brand
          in: query
          required: false
          schema:
            type: string
          description: Filter by brand, e.g. Volvo
      responses:
        "200":
          description: List of cars
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Car"
                  count:
                    type: integer
                    example: 8

    post:
      summary: Create a new car
      tags:
        - Cars
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCar"
      responses:
        "201":
          description: Car created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"
        "400":
          description: Invalid or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Car already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cars/{id}:
    get:
      summary: Get a car by id
      tags:
        - Cars
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Car found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Car not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      summary: Update a car
      tags:
        - Cars
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCar"
      responses:
        "200":
          description: Car updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"
        "400":
          description: Invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Car not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a car
      tags:
        - Cars
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Car deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Car 'Volvo XC90' was deleted"
                  deleted:
                    $ref: "#/components/schemas/Car"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Car not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"